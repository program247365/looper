[package]
name = "looper"
version = "0.1.0"
authors = ["Kevin B. Ridgway <kridgway@gmail.com>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[[bin]]
name = "looper"
path = "src/main.rs"

[dependencies]
color-eyre = "0.6.1"
crossterm = "0.27"
libc = "0.2"
directories = "3.0.2"
ratatui = "0.26"
spectrum-analyzer = "1.7"
symphonia = { version = "0.5", default-features = false }
rodio = { version = "0.17", features = ["mp3"] }
structopt = "0.3.21"

[dev-dependencies]
assert_cmd = "1.0.5"
